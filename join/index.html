<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join WeTime</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0D0818;color:#F0EAF8;line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  a{color:inherit;text-decoration:none}

  .card{background:rgba(26,17,40,.8);border:1px solid rgba(107,107,174,.18);border-radius:20px;padding:48px 40px;text-align:center;max-width:440px;width:100%}
  .wordmark{font-size:18px;font-weight:800;color:#E8820C;margin-bottom:32px}
  h1{font-size:1.5rem;font-weight:700;margin-bottom:32px;line-height:1.3}
  .code-label{font-size:.85rem;color:#7A6890;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:8px}
  .code{font-size:2rem;font-weight:700;color:#E8820C;letter-spacing:.15em;font-family:ui-monospace,SFMono-Regular,monospace;display:block;margin-bottom:32px}
  .no-code{color:#7A6890;font-size:1rem;margin-bottom:24px}

  /* Loading */
  #loading{text-align:center}
  .spinner{width:32px;height:32px;border:3px solid rgba(107,107,174,.18);border-top-color:#E8820C;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:#7A6890;font-size:.95rem}

  /* Fallback */
  #fallback{display:none;text-align:center}
  .fallback-text{color:#7A6890;font-size:1rem;margin-bottom:16px}
  .app-store-btn{display:inline-flex;align-items:center;gap:10px;background:#E8820C;color:#fff;padding:14px 28px;border-radius:999px;font-size:1rem;font-weight:600;transition:opacity .2s}
  .app-store-btn:hover{opacity:.9}
  .app-store-btn svg{flex-shrink:0}
  .manual{color:#7A6890;font-size:.9rem;margin-top:20px;line-height:1.5}
  .manual strong{color:#F0EAF8}
</style>
</head>
<body>

<div class="card">
  <div class="wordmark">WeTime</div>
  <h1>You've been invited to WeTime</h1>

  <div id="code-display"></div>

  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Opening WeTime...</p>
  </div>

  <div id="fallback">
    <p class="fallback-text">Don't have WeTime?</p>
    <a href="#" class="app-store-btn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11"/></svg>
      Download on the App Store
    </a>
    <p id="manual-entry" class="manual"></p>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code') || '';

  const codeDisplay = document.getElementById('code-display');
  const manualEntry = document.getElementById('manual-entry');

  if (code) {
    codeDisplay.innerHTML =
      '<span class="code-label">Invite Code</span>' +
      '<span class="code">' + code.replace(/[<>&"']/g, '') + '</span>';
    manualEntry.innerHTML = 'Or enter code <strong>' + code.replace(/[<>&"']/g, '') + '</strong> in the app';
    window.location.href = 'wetime://join/' + encodeURIComponent(code);
  } else {
    codeDisplay.innerHTML = '<p class="no-code">No invite code found. Ask your partner to send you a new link.</p>';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
  }

  setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fallback').style.display = 'block';
  }, 1500);
</script>

</body>
</html>
